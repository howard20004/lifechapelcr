<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Life Chapel International | Contact</title>

<link rel="stylesheet" href="https://unicons.iconscout.com/release/v4.0.8/css/line.css">

<style>

/* ===== RESET ===== */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI', sans-serif;
}

body{
background:linear-gradient(135deg,#eef2f3,#dfe9f3);
color:#222;
transition:.3s;
}

body.dark{
background:#0f172a;
color:#eee;
}

/* ===== NAVBAR ===== */
header{
position:sticky;
top:0;
background:#fff;
box-shadow:0 4px 20px rgba(0,0,0,0.08);
z-index:1000;
}

body.dark header{
background:#1e293b;
}

.nav-container{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 6%;
}

.nav-image{
width:75px;
height:75px;
border-radius:50%;
object-fit:cover;
border:3px solid #007BFF;
}

.nav-content{
list-style:none;
display:flex;
gap:25px;
}

.nav-content a{
text-decoration:none;
color:inherit;
font-weight:600;
position:relative;
}

.nav-content a::after{
content:"";
position:absolute;
width:0;
height:2px;
background:#007BFF;
left:0;
bottom:-5px;
transition:.3s;
}

.nav-content a:hover::after{
width:100%;
}

.nav-right{
display:flex;
align-items:center;
gap:15px;
}

.menu-toggle{
font-size:28px;
cursor:pointer;
display:none;
}

.theme-toggle{
background:#007BFF;
color:#fff;
border:none;
padding:10px;
border-radius:50%;
cursor:pointer;
}

/* ===== HERO ===== */
.hero{
height:60vh;
background:linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),
url('./life3.jpg') center/cover no-repeat;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
color:#fff;
}

.hero h1{
font-size:40px;
}

/* ===== FLOATING BUTTONS ===== */
.whatsapp-btn,
.facebook-btn,
.youtube-btn{
position:fixed;
right:20px;
color:#fff;
font-size:26px;
padding:14px;
border-radius:50%;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
z-index:1000;
transition:.3s;
}

.whatsapp-btn{bottom:20px;background:#25D366;}
.facebook-btn{bottom:85px;background:#1877F2;}
.youtube-btn{bottom:150px;background:#FF0000;}

.whatsapp-btn:hover,
.facebook-btn:hover,
.youtube-btn:hover{
transform:scale(1.1);
}

/* ===== CONTACT ===== */
.contact-section{
padding:70px 20px;
background: radial-gradient(circle at top, #0f172a, #020617);
color:#fff;
display:flex;
flex-direction:column;
align-items:center;
}

.contact-header{
text-align:center;
max-width:520px;
margin-bottom:20px;
}

.contact-header h2{
font-size:2.4rem;
margin-bottom:10px;
}

.contact-form{
max-width:520px;
width:100%;
display:flex;
flex-direction:column;
gap:15px;
padding:25px;
background:rgba(255,255,255,0.07);
border-radius:18px;
backdrop-filter:blur(14px);
}

.contact-form input,
.contact-form textarea{
padding:14px;
border:none;
border-radius:10px;
background:rgba(255,255,255,0.12);
color:#fff;
outline:none;
}

.contact-form textarea{
min-height:130px;
resize:none;
}

.contact-form button{
padding:14px;
border:none;
border-radius:10px;
background:#38bdf8;
color:#fff;
font-weight:bold;
cursor:pointer;
}

/* ===== FOOTER ===== */
.footer{
background:#020617;
color:#fff;
padding:50px 20px;
text-align:center;
border-top:1px solid rgba(255,255,255,0.1);
}

.footer-links{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
margin:15px 0;
}

.footer-links a{
color:#38bdf8;
text-decoration:none;
}

/* ===== MOBILE ===== */
@media(max-width:768px){

.menu-toggle{display:block;}

.nav-content{
display:none;
position:absolute;
top:80px;
right:0;
background:#fff;
flex-direction:column;
width:220px;
padding:20px;
border-radius:10px;
}

body.dark .nav-content{
background:#1e293b;
}

.nav-content.active{
display:flex;
}

}

</style>
</head>

<body>

<!-- FLOATING BUTTONS -->
<a href="https://wa.me/23173464682" class="whatsapp-btn"><i class="uil uil-whatsapp"></i></a>
<a href="https://web.facebook.com/lifechapel.cedar.rapids" class="facebook-btn"><i class="uil uil-facebook"></i></a>
<a href="https://www.youtube.com/@LifeChapelCedarRapids/live" class="youtube-btn"><i class="uil uil-youtube"></i></a>

<!-- NAVBAR -->
<header>
<nav class="nav-container">

<img src="./life1.jpg" class="nav-image">

<ul class="nav-content" id="navMenu">
<li><a href="index.html">Home</a></li>
<li><a href="about.html">About</a></li>
<li><a href="event.html">Event</a></li>
<li><a href="contact.html">Contact</a></li>
</ul>

<div class="nav-right">
<button class="theme-toggle"><i class="uil uil-moon"></i></button>
<i class="uil uil-bars menu-toggle" id="menuBtn"></i>
</div>

</nav>
</header>

<!-- HERO -->
<section class="hero">
<h1>Contact Life Chapel</h1>
</section>

<!-- CONTACT -->
<section class="contact-section">

<div class="contact-header">
<h2>Contact Us</h2>
<p>Send us a message anytime. We will respond soon.</p>
</div>

<form action="https://formsubmit.co/mulbahhoward2004@gmail.com" method="POST" class="contact-form">

<input type="text" name="name" placeholder="Your Name" required>
<input type="email" name="email" placeholder="Your Email" required>
<textarea name="message" placeholder="Your Message" required></textarea>

<input type="hidden" name="_captcha" value="false">


<input type="hidden" name="_next" value="https://howard20004.github.io/LifeChapelCR/thankyou.html">

<button type="submit">Send Message</button>

</form>

</section>

<!-- FOOTER -->
<footer class="footer">

<h3>Life Chapel International</h3>
<p>Building faith, transforming lives through Christ.</p>

<div class="footer-links">
<a href="lifechapel.html">Home</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>
<a href="event.html">Event</a>
</div>

<p>© 2026 All Rights Reserved</p>

</footer>

<script>

// DARK MODE
const toggleBtn=document.querySelector(".theme-toggle");
const icon=toggleBtn.querySelector("i");

toggleBtn.onclick=()=>{
document.body.classList.toggle("dark");
icon.classList.toggle("uil-moon");
icon.classList.toggle("uil-sun");
};

// MOBILE MENU
const menuBtn=document.getElementById("menuBtn");
const navMenu=document.getElementById("navMenu");

menuBtn.onclick=()=>{
navMenu.classList.toggle("active");
};

</script>

</body>
</html>
