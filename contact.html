<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Life Chapel International | Contact</title>

<link rel="stylesheet" href="https://unicons.iconscout.com/release/v4.0.8/css/line.css">

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI', sans-serif;
}

body{
background:linear-gradient(135deg,#eef2f3,#dfe9f3);
color:#222;
transition:.3s;
}

body.dark{
background:#0f172a;
color:#eee;
}

/* NAVBAR */
header{
position:sticky;
top:0;
background:#fff;
box-shadow:0 4px 20px rgba(0,0,0,0.08);
z-index:1000;
}

body.dark header{
background:#1e293b;
}

.nav-container{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 6%;
}

.nav-image{
width:70px;
height:70px;
border-radius:50%;
object-fit:cover;
border:3px solid #007BFF;
}

.nav-content{
list-style:none;
display:flex;
gap:25px;
}

.nav-content a{
text-decoration:none;
color:inherit;
font-weight:600;
}

.nav-right{
display:flex;
align-items:center;
gap:15px;
}

.menu-toggle{
font-size:28px;
cursor:pointer;
display:none;
}

.theme-toggle{
background:#007BFF;
color:#fff;
border:none;
padding:10px;
border-radius:50%;
cursor:pointer;
}

/* CONTACT */
.contact-section{
padding:80px 20px;
background: radial-gradient(circle at top, #0f172a, #020617);
color:#fff;
display:flex;
flex-direction:column;
align-items:center;
}

.contact-header{
text-align:center;
max-width:500px;
margin-bottom:25px;
}

.contact-header h2{
font-size:2.3rem;
margin-bottom:10px;
}

.contact-form{
max-width:500px;
width:100%;
display:flex;
flex-direction:column;
gap:15px;
padding:25px;
background:rgba(255,255,255,0.08);
border-radius:18px;
backdrop-filter:blur(12px);
}

.contact-form input,
.contact-form textarea{
padding:14px;
border:none;
border-radius:10px;
background:rgba(255,255,255,0.12);
color:#fff;
outline:none;
}

.contact-form textarea{
min-height:120px;
resize:none;
}

.contact-form button{
padding:14px;
border:none;
border-radius:10px;
background:#38bdf8;
color:#fff;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

.contact-form button:hover{
transform:translateY(-3px);
}

/* MOBILE */
@media(max-width:768px){

.menu-toggle{display:block;}

.nav-content{
display:none;
position:absolute;
top:80px;
right:0;
background:#fff;
flex-direction:column;
width:200px;
padding:20px;
border-radius:10px;
}

body.dark .nav-content{
background:#1e293b;
}

.nav-content.active{
display:flex;
}

}

</style>
</head>

<body>

<!-- NAVBAR -->
<header>
<nav class="nav-container">

<img src="./life1.jpg" class="nav-image">

<ul class="nav-content" id="navMenu">
<li><a href="lifechapel.html">Home</a></li>
<li><a href="about.html">About</a></li>
<li><a href="event.html">Event</a></li>
<li><a href="contact.html">Contact</a></li>
</ul>

<div class="nav-right">
<button class="theme-toggle"><i class="uil uil-moon"></i></button>
<i class="uil uil-bars menu-toggle" id="menuBtn"></i>
</div>

</nav>
</header>

<!-- CONTACT -->
<section class="contact-section">

<div class="contact-header">
<h2>Contact Us</h2>
<p>Send us a message anytime. We will respond soon.</p>
</div>

<form action="https://formsubmit.co/mulbahhoward2004@gmail.com" method="POST" class="contact-form">

<input type="text" name="name" placeholder="Your Name" required>

<input type="email" name="email" placeholder="Your Email" required>

<textarea name="message" placeholder="Your Message" required></textarea>

<input type="hidden" name="_captcha" value="false">


<input type="hidden" name="_next" value="https://howard20004.github.io/LifeChapelCR/thankyou.html">

<button type="submit">Send Message</button>

</form>

</section>

<script>

// DARK MODE
const toggleBtn=document.querySelector(".theme-toggle");
const icon=toggleBtn.querySelector("i");

toggleBtn.onclick=()=>{
document.body.classList.toggle("dark");
icon.classList.toggle("uil-moon");
icon.classList.toggle("uil-sun");
};

// MOBILE MENU
const menuBtn=document.getElementById("menuBtn");
const navMenu=document.getElementById("navMenu");

menuBtn.onclick=()=>{
navMenu.classList.toggle("active");
};

</script>

</body>
</html>
